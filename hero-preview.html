<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 BMSIT — Hero Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  body { background: #08080c; color: #fff; overflow-x: hidden; }

  /* Scroll height container */
  .scroll-spacer { height: 500vh; position: relative; pointer-events: none; }

  /* Canvas positioning handled via JS */

  /* Vignette */
  .vignette {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(8,8,12,0.75) 100%);
  }

  /* Text overlay */
  .overlay {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  .act {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; padding: 2rem;
    transition: opacity 0.4s ease;
  }
  .act.active { opacity: 1; }

  .headline {
    font-size: clamp(1.4rem, 3.5vw, 2.8rem);
    font-weight: 700; text-align: center;
    max-width: 720px; letter-spacing: -0.03em; line-height: 1.2;
    color: rgba(255,255,255,0.88);
  }
  .big-title {
    font-size: clamp(3rem, 10vw, 9rem);
    font-weight: 900; text-align: center;
    letter-spacing: -0.06em; line-height: 0.9;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 40%, #4ade80 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: clamp(0.65rem, 1.2vw, 0.95rem);
    font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.3em; color: rgba(255,255,255,0.3);
    margin-top: 1.2rem;
  }
  .cta {
    pointer-events: auto; margin-top: 2.5rem;
    padding: 1rem 2.5rem; border: none; cursor: pointer;
    background: #4ade80; color: #08080c;
    font-family: inherit; font-weight: 800; font-size: 0.8rem;
    text-transform: uppercase; letter-spacing: 0.18em;
    transition: all 0.3s ease;
    animation: ctaGlow 2.5s ease-in-out infinite;
  }
  .cta:hover { background: #22c55e; transform: scale(1.06); }
  @keyframes ctaGlow {
    0%, 100% { box-shadow: 0 0 20px rgba(74,222,128,0.25); }
    50%      { box-shadow: 0 0 45px rgba(74,222,128,0.45), 0 0 80px rgba(74,222,128,0.15); }
  }

  /* Progress bar */
  .progress { position: fixed; top: 0; left: 0; height: 2px; background: #4ade80; z-index: 30; width: 0%; }

  /* Scroll hint */
  .scroll-hint {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    z-index: 20; pointer-events: none;
    font-size: 0.6rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.35em;
    color: rgba(255,255,255,0.15);
    transition: opacity 0.6s ease;
  }
  .scroll-hint span { display: inline-block; animation: bob 2.2s ease-in-out infinite; }
  @keyframes bob {
    0%, 100% { transform: translateY(0); opacity: 0.3; }
    50%      { transform: translateY(6px); opacity: 0.8; }
  }

  /* Loader */
  #loader {
    position: fixed; inset: 0; z-index: 100; background: #08080c;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.6s ease;
  }
  #loader span {
    color: #4ade80; font-size: 0.65rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.4em;
    animation: loaderPulse 1.2s ease-in-out infinite;
  }
  @keyframes loaderPulse {
    0%, 100% { opacity: 0.4; } 50% { opacity: 1; }
  }
</style>
</head>
<body>

<div id="loader"><span>Initializing...</span></div>
<div class="progress" id="progress"></div>
<div class="vignette"></div>

<div class="scroll-spacer" id="scrollSpacer"></div>

<div class="overlay">
  <div class="act" id="act0">
    <p class="headline" id="txt0"></p>
  </div>
  <div class="act" id="act1">
    <p class="headline" id="txt1"></p>
  </div>
  <div class="act" id="act2">
    <p class="headline" id="txt2"></p>
  </div>
  <div class="act" id="act3">
    <h1 class="big-title" id="txt3"></h1>
    <p class="subtitle" id="txt3sub"></p>
    <button class="cta" id="ctaBtn">Join the Chain →</button>
  </div>
</div>

<div class="scroll-hint" id="scrollHint"><span>↓ scroll to explore</span></div>

<!-- CDN Scripts -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ════════════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════════════
const ACCENT    = 0x4ade80;
const ACCENT_V  = new THREE.Color(ACCENT);
const BG        = 0x08080c;
const P_COUNT   = 2500;
const NODE_CT   = 55;
const SCRAMBLE  = '#◆Ξ0x▲9f$&';

const TEXTS = [
  { el: 'txt0', text: 'The decentralized revolution starts here' },
  { el: 'txt1', text: 'Smart contracts. DeFi. NFTs. Web3.' },
  { el: 'txt2', text: 'Built by students. Powered by Ethereum.' },
  { el: 'txt3', text: 'Web3 BMSIT' },
];

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let scroll = 0, act = -1;
const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
const clock = new THREE.Clock();

// ════════════════════════════════════════════════════════════
//  TEXT SCRAMBLE
// ════════════════════════════════════════════════════════════
function scramble(id, final, dur = 850) {
  const el = document.getElementById(id);
  if (!el) return;
  const len = final.length, t0 = performance.now();
  (function tick() {
    const p = Math.min((performance.now() - t0) / dur, 1);
    const rev = Math.floor(p * len);
    let s = '';
    for (let i = 0; i < len; i++) {
      if (i < rev) s += final[i];
      else if (final[i] === ' ') s += ' ';
      else s += SCRAMBLE[Math.random() * SCRAMBLE.length | 0];
    }
    el.textContent = s;
    if (p < 1) requestAnimationFrame(tick);
  })();
}

// ════════════════════════════════════════════════════════════
//  ACT MANAGER
// ════════════════════════════════════════════════════════════
function setAct(i) {
  if (i === act) return;
  act = i;
  document.querySelectorAll('.act').forEach((el, idx) =>
    el.classList.toggle('active', idx === i)
  );
  if (i >= 0 && i < TEXTS.length) scramble(TEXTS[i].el, TEXTS[i].text);
  if (i === 3) scramble('txt3sub', "BMSIT College's Blockchain Club", 650);
  if (i > 0) document.getElementById('scrollHint').style.opacity = '0';
}

// ════════════════════════════════════════════════════════════
//  LENIS + GSAP
// ════════════════════════════════════════════════════════════
let lenis = null;
try {
  const L = window.Lenis;
  if (L) {
    lenis = new L({ duration: 1.4, easing: t => Math.min(1, 1.001 - 2 ** (-10 * t)), smoothWheel: true });
    lenis.on('scroll', ScrollTrigger.update);
  }
} catch (_) {}

gsap.registerPlugin(ScrollTrigger);
ScrollTrigger.create({
  trigger: '#scrollSpacer',
  start: 'top top',
  end: 'bottom bottom',
  onUpdate: s => {
    scroll = s.progress;
    document.getElementById('progress').style.width = `${scroll * 100}%`;
    if      (scroll < 0.25) setAct(0);
    else if (scroll < 0.50) setAct(1);
    else if (scroll < 0.75) setAct(2);
    else                    setAct(3);
  }
});

// ════════════════════════════════════════════════════════════
//  MOUSE
// ════════════════════════════════════════════════════════════
window.addEventListener('mousemove', e => {
  mouse.tx = (e.clientX / innerWidth) * 2 - 1;
  mouse.ty = -(e.clientY / innerHeight) * 2 + 1;
});
window.addEventListener('touchmove', e => {
  if (e.touches[0]) {
    mouse.tx = (e.touches[0].clientX / innerWidth) * 2 - 1;
    mouse.ty = -(e.touches[0].clientY / innerHeight) * 2 + 1;
  }
}, { passive: true });

// ════════════════════════════════════════════════════════════
//  THREE — SCENE
// ════════════════════════════════════════════════════════════
const scene    = new THREE.Scene();
scene.background = new THREE.Color(BG);
scene.fog      = new THREE.FogExp2(BG, 0.038);

const camera   = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 7);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
Object.assign(renderer.domElement.style, { position: 'fixed', top: '0', left: '0', zIndex: '1' });
document.body.prepend(renderer.domElement);

// ════════════════════════════════════════════════════════════
//  ENVIRONMENT MAP (procedural)
// ════════════════════════════════════════════════════════════
const pmrem = new THREE.PMREMGenerator(renderer);
const envS  = new THREE.Scene();
envS.background = new THREE.Color(BG);
[
  { c: 0x4ade80, p: [5, 5, 5] },
  { c: 0x7c3aed, p: [-5, -3, 5] },
  { c: 0x3b82f6, p: [0, -5, -5] },
  { c: 0x4ade80, p: [-3, 6, -4] },
].forEach(l => {
  const m = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshBasicMaterial({ color: l.c }));
  m.position.set(...l.p);
  envS.add(m);
});
scene.environment = pmrem.fromScene(envS, 0).texture;
pmrem.dispose();

// ════════════════════════════════════════════════════════════
//  LIGHTS
// ════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x111122, 0.6));

const keyLight = new THREE.PointLight(ACCENT, 4, 30);
keyLight.position.set(3, 4, 5);
scene.add(keyLight);

const fillLight = new THREE.PointLight(0x7c3aed, 1.5, 25);
fillLight.position.set(-4, -2, 3);
scene.add(fillLight);

const hoverLight = new THREE.PointLight(ACCENT, 0, 12);
scene.add(hoverLight);

// ════════════════════════════════════════════════════════════
//  POST-PROCESSING
// ════════════════════════════════════════════════════════════
let composer = null;
try {
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.4, 0.5, 0.82);
  composer.addPass(bloom);
  composer.addPass(new OutputPass());
} catch (_) { composer = null; }

// ════════════════════════════════════════════════════════════
//  ETH — Iridescent Morphing Octahedron
// ════════════════════════════════════════════════════════════
const ethGeo = new THREE.IcosahedronGeometry(1.4, 4);
const ethMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:  { value: 0 },
    uMorph: { value: 0 },
    uScale: { value: 1 },
  },
  vertexShader: `
    uniform float uTime, uMorph, uScale;
    varying vec3 vWorldPos, vViewDir, vNorm;

    void main() {
      vec3 p = position;

      // octahedron morph: project onto |x|+|y|+|z| = radius
      float l1 = abs(p.x) + abs(p.y) + abs(p.z);
      vec3 octP = p * (1.4 / max(l1, 0.001));
      p = mix(p, octP, uMorph);

      // breathing
      p *= uScale * (1.0 + sin(uTime * 0.8) * 0.012);

      vNorm = normalize(normalMatrix * normal);
      vec4 wPos = modelMatrix * vec4(p, 1.0);
      vWorldPos = wPos.xyz;
      vec4 mv = viewMatrix * wPos;
      vViewDir = normalize(-mv.xyz);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying vec3 vWorldPos, vViewDir, vNorm;
    uniform float uTime;

    vec3 pal(float t) {
      return 0.5 + 0.5 * cos(6.28318 * (t + vec3(0.0, 0.33, 0.67)));
    }

    void main() {
      // flat normals from derivatives
      vec3 dx = dFdx(vWorldPos);
      vec3 dy = dFdy(vWorldPos);
      vec3 n  = normalize(cross(dx, dy));

      float NdV = dot(n, vViewDir);
      float fresnel = pow(1.0 - abs(NdV), 2.5);

      // iridescence
      vec3 iri = pal(NdV * 1.8 + uTime * 0.12);

      // lighting
      vec3 lDir = normalize(vec3(3.0, 4.0, 5.0));
      float diff = max(dot(n, lDir), 0.0) * 0.55 + 0.45;
      vec3 h = normalize(lDir + vViewDir);
      float spec = pow(max(dot(n, h), 0.0), 80.0);

      vec3 col = iri * diff;
      col += vec3(0.29, 0.87, 0.5) * fresnel * 0.55;
      col += vec3(1.0) * spec * 0.25;
      col += vec3(0.29, 0.87, 0.5) * 0.04;

      gl_FragColor = vec4(col, 1.0);
    }
  `,
});
const ethMesh = new THREE.Mesh(ethGeo, ethMat);
scene.add(ethMesh);

// ════════════════════════════════════════════════════════════
//  BTC — Oxidized Bronze Icosahedron
// ════════════════════════════════════════════════════════════
const btcMat = new THREE.MeshPhysicalMaterial({
  color: 0x8b6c3c,
  metalness: 0.88,
  roughness: 0.42,
  emissive: ACCENT,
  emissiveIntensity: 0.06,
  iridescence: 0.35,
  iridescenceIOR: 1.4,
  transparent: true,
  opacity: 0,
});
const btcMesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.9, 0), btcMat);
btcMesh.visible = false;
btcMesh.rotation.set(0.3, 0, 0.5); // tilted axis
scene.add(btcMesh);

// ════════════════════════════════════════════════════════════
//  SOL — Torus Knot
// ════════════════════════════════════════════════════════════
const solMat = new THREE.MeshPhysicalMaterial({
  color: 0x9945ff,
  metalness: 0.72,
  roughness: 0.15,
  iridescence: 1.0,
  iridescenceIOR: 1.5,
  iridescenceThicknessRange: [100, 400],
  emissive: ACCENT,
  emissiveIntensity: 0.03,
  transparent: true,
  opacity: 0,
});
const solMesh = new THREE.Mesh(new THREE.TorusKnotGeometry(0.65, 0.22, 100, 16), solMat);
solMesh.visible = false;
scene.add(solMesh);

// ════════════════════════════════════════════════════════════
//  PARTICLE SYSTEM
// ════════════════════════════════════════════════════════════
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(P_COUNT * 3);
const pOrig = new Float32Array(P_COUNT * 3);
for (let i = 0; i < P_COUNT * 3; i += 3) {
  pOrig[i]   = pPos[i]   = (Math.random() - 0.5) * 22;
  pOrig[i+1] = pPos[i+1] = (Math.random() - 0.5) * 16;
  pOrig[i+2] = pPos[i+2] = (Math.random() - 0.5) * 16;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));

const pMat = new THREE.PointsMaterial({
  color: ACCENT,
  size: 0.028,
  transparent: true,
  opacity: 0.35,
  sizeAttenuation: true,
  depthWrite: false,
});
scene.add(new THREE.Points(pGeo, pMat));

// ════════════════════════════════════════════════════════════
//  NODE GRAPH (for Act 3)
// ════════════════════════════════════════════════════════════
const nodes = [];
for (let i = 0; i < NODE_CT; i++) {
  nodes.push(new THREE.Vector3(
    (Math.random() - 0.5) * 12,
    (Math.random() - 0.5) * 7,
    (Math.random() - 0.5) * 7,
  ));
}

// assign each particle to a node
const pNodeMap = new Uint8Array(P_COUNT);
for (let i = 0; i < P_COUNT; i++) pNodeMap[i] = Math.random() * NODE_CT | 0;

// edges: connect nearby nodes
const edges = [];
for (let i = 0; i < NODE_CT; i++)
  for (let j = i + 1; j < NODE_CT; j++)
    if (nodes[i].distanceTo(nodes[j]) < 3.2) edges.push([i, j]);

const lineArr = new Float32Array(edges.length * 6);
edges.forEach(([a, b], i) => {
  lineArr[i*6]   = nodes[a].x; lineArr[i*6+1] = nodes[a].y; lineArr[i*6+2] = nodes[a].z;
  lineArr[i*6+3] = nodes[b].x; lineArr[i*6+4] = nodes[b].y; lineArr[i*6+5] = nodes[b].z;
});
const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.BufferAttribute(lineArr, 3));
const lineMat = new THREE.LineBasicMaterial({ color: ACCENT, transparent: true, opacity: 0, depthWrite: false });
const lines   = new THREE.LineSegments(lineGeo, lineMat);
scene.add(lines);

// ════════════════════════════════════════════════════════════
//  GRID FLOOR
// ════════════════════════════════════════════════════════════
const grid = new THREE.GridHelper(60, 60, ACCENT, ACCENT);
grid.position.y = -3.5;
grid.material.opacity = 0.045;
grid.material.transparent = true;
grid.material.depthWrite = false;
scene.add(grid);

// ════════════════════════════════════════════════════════════
//  HEX CHARACTER SPRITES
// ════════════════════════════════════════════════════════════
const hexChars = ['0x', 'Ξ', '#', '◆', '▲', '9f'];
const hexSprites = [];

function charTex(ch) {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const x = c.getContext('2d');
  x.fillStyle = 'rgba(74,222,128,0.12)';
  x.font = 'bold 28px monospace';
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  x.fillText(ch, 32, 32);
  return new THREE.CanvasTexture(c);
}

for (let i = 0; i < 35; i++) {
  const tex = charTex(hexChars[Math.random() * hexChars.length | 0]);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.18, depthWrite: false });
  const sp  = new THREE.Sprite(mat);
  sp.position.set((Math.random()-0.5)*30, (Math.random()-0.5)*18, (Math.random()-0.5)*18-4);
  sp.scale.set(1.4, 1.4, 1);
  scene.add(sp);
  hexSprites.push({ sp, vx: (Math.random()-0.5)*0.004, vy: (Math.random()-0.5)*0.003 });
}

// ════════════════════════════════════════════════════════════
//  RESIZE
// ════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if (composer) composer.setSize(innerWidth, innerHeight);
});

// ════════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ════════════════════════════════════════════════════════════
function animate(ts) {
  requestAnimationFrame(animate);
  if (lenis) lenis.raf(ts);

  const dt = clock.getDelta();
  const t  = clock.getElapsedTime();

  // ── mouse smooth ──
  mouse.x += (mouse.tx - mouse.x) * 0.04;
  mouse.y += (mouse.ty - mouse.y) * 0.04;

  // ── camera parallax (3 depth layers concept via single camera) ──
  camera.position.x = mouse.x * 0.45;
  camera.position.y = mouse.y * 0.30 + 0.2;
  camera.lookAt(0, 0, 0);

  // ── hover glow light ──
  hoverLight.position.set(mouse.x * 3, mouse.y * 3, 4);
  hoverLight.intensity = 0.6 + Math.sin(t * 3) * 0.35;

  // ── ETH continuous rotation + morph ──
  ethMesh.rotation.y += dt * 0.18;
  ethMesh.rotation.x += dt * 0.08;
  ethMat.uniforms.uTime.value = t;
  ethMat.uniforms.uMorph.value = Math.sin(t * 0.4) * 0.5 + 0.5; // sphere ↔ octahedron

  // ── BTC rotation on tilted axis ──
  btcMesh.rotation.y += dt * 0.25;
  btcMesh.rotation.z += dt * 0.08;

  // ── SOL fast self-rotation ──
  solMesh.rotation.y += dt * 0.55;
  solMesh.rotation.x += dt * 0.2;

  // ═══════ ACT-BASED ANIMATION ═══════

  if (scroll < 0.25) {
    // ─── ACT 1: Genesis — ETH alone ───
    ethMat.uniforms.uScale.value += (1.0 - ethMat.uniforms.uScale.value) * 0.05;
    btcMesh.visible = false;
    solMesh.visible = false;
    btcMat.opacity = 0;
    solMat.opacity = 0;
    lineMat.opacity = 0;

  } else if (scroll < 0.50) {
    // ─── ACT 2: Expansion — BTC + SOL materialize & orbit ───
    const ap = (scroll - 0.25) / 0.25;
    btcMesh.visible = true;
    solMesh.visible = true;
    const fadeIn = Math.min(ap * 3, 1);
    btcMat.opacity = fadeIn;
    solMat.opacity = fadeIn;
    btcMesh.scale.setScalar(fadeIn);
    solMesh.scale.setScalar(fadeIn);

    // tilted orbit
    const orb = t * 0.35;
    btcMesh.position.set(
      Math.cos(orb) * 3.2,
      Math.sin(orb * 0.6) * 1.2,
      Math.sin(orb) * 3.2
    );
    solMesh.position.set(
      Math.cos(orb + Math.PI) * 3.2,
      Math.sin(orb * 0.6 + Math.PI) * 1.2,
      Math.sin(orb + Math.PI) * 3.2
    );

    ethMat.uniforms.uScale.value += (1.0 - ethMat.uniforms.uScale.value) * 0.05;
    lineMat.opacity = 0;

  } else if (scroll < 0.75) {
    // ─── ACT 3: Convergence — dissolve to node-graph ───
    const ap = (scroll - 0.50) / 0.25;
    const dissolve = Math.min(ap * 2.5, 1);

    ethMat.uniforms.uScale.value += ((1 - dissolve) - ethMat.uniforms.uScale.value) * 0.08;
    btcMesh.scale.setScalar(Math.max(1 - dissolve, 0));
    solMesh.scale.setScalar(Math.max(1 - dissolve, 0));
    btcMat.opacity = 1 - dissolve;
    solMat.opacity = 1 - dissolve;

    // node-graph lines appear
    lineMat.opacity += (dissolve * 0.25 - lineMat.opacity) * 0.06;

    // subtle camera shake
    camera.position.x += (Math.random() - 0.5) * 0.004 * (1 - dissolve);
    camera.position.y += (Math.random() - 0.5) * 0.004 * (1 - dissolve);

  } else {
    // ─── ACT 4: The Chain — nodes solidify, club name ───
    const ap = (scroll - 0.75) / 0.25;
    ethMat.uniforms.uScale.value += (ap * 0.55 - ethMat.uniforms.uScale.value) * 0.05;
    ethMesh.position.lerp(new THREE.Vector3(0, 0, 0), 0.03);

    btcMesh.visible = true;
    solMesh.visible = true;
    btcMesh.scale.setScalar(ap * 0.45);
    solMesh.scale.setScalar(ap * 0.45);
    btcMat.opacity = ap;
    solMat.opacity = ap;
    btcMesh.position.lerp(new THREE.Vector3(-2.5, 1.2, -1), 0.03);
    solMesh.position.lerp(new THREE.Vector3(2.5, -1, -1), 0.03);

    lineMat.opacity += (0.18 - lineMat.opacity) * 0.04;
  }

  // ═══════ PARTICLES ═══════
  const pa = pGeo.attributes.position.array;

  if (scroll < 0.50) {
    // drift
    pMat.opacity += (0.30 - pMat.opacity) * 0.05;
    pMat.size = 0.028;
    for (let i = 0; i < P_COUNT; i++) {
      const i3 = i * 3;
      pa[i3]   += Math.sin(t * 0.08 + i * 0.11) * 0.0015;
      pa[i3+1] += Math.cos(t * 0.07 + i * 0.07) * 0.0015;
      pa[i3+2] += Math.sin(t * 0.09 + i * 0.04) * 0.0015;
    }
  } else if (scroll < 0.75) {
    // converge to node graph
    pMat.opacity += (0.55 - pMat.opacity) * 0.04;
    pMat.size = 0.038;
    const ap = (scroll - 0.50) / 0.25;
    const spd = 0.015 + ap * 0.04;
    for (let i = 0; i < P_COUNT; i++) {
      const nd = nodes[pNodeMap[i]];
      const i3 = i * 3;
      const jit = 0.22;
      const tx = nd.x + Math.sin(i * 0.1 + t * 0.4) * jit;
      const ty = nd.y + Math.cos(i * 0.13 + t * 0.4) * jit;
      const tz = nd.z + Math.sin(i * 0.07 + t * 0.4) * jit;
      pa[i3]   += (tx - pa[i3])   * spd;
      pa[i3+1] += (ty - pa[i3+1]) * spd;
      pa[i3+2] += (tz - pa[i3+2]) * spd;
    }
  } else {
    // hold near nodes with gentle drift
    pMat.opacity += (0.45 - pMat.opacity) * 0.04;
    for (let i = 0; i < P_COUNT; i++) {
      const nd = nodes[pNodeMap[i]];
      const i3 = i * 3;
      const jit = 0.15;
      const tx = nd.x + Math.sin(i * 0.1 + t * 0.25) * jit;
      const ty = nd.y + Math.cos(i * 0.13 + t * 0.25) * jit;
      const tz = nd.z + Math.sin(i * 0.07 + t * 0.25) * jit;
      pa[i3]   += (tx - pa[i3])   * 0.015;
      pa[i3+1] += (ty - pa[i3+1]) * 0.015;
      pa[i3+2] += (tz - pa[i3+2]) * 0.015;
    }
  }
  pGeo.attributes.position.needsUpdate = true;

  // ═══════ HEX SPRITES ═══════
  hexSprites.forEach(h => {
    h.sp.position.x += h.vx;
    h.sp.position.y += h.vy;
    // wrap around
    if (h.sp.position.x >  16) h.sp.position.x = -16;
    if (h.sp.position.x < -16) h.sp.position.x =  16;
    if (h.sp.position.y >  10) h.sp.position.y = -10;
    if (h.sp.position.y < -10) h.sp.position.y =  10;
  });

  // ═══════ GRID subtle pulse ═══════
  grid.material.opacity = 0.04 + Math.sin(t * 0.3) * 0.01;

  // ═══════ RENDER ═══════
  if (composer) composer.render();
  else renderer.render(scene, camera);
}

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
setAct(0);
requestAnimationFrame(animate);

// hide loader
const loader = document.getElementById('loader');
loader.style.opacity = '0';
setTimeout(() => loader.remove(), 700);

</script>
</body>
